<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>수로 면제 신청 — 뚠/뚱카롱</title>
<meta name="description" content="뚠/뚱카롱 길드 수로 면제 신청 페이지">
<meta property="og:title" content="수로 면제 신청 — 뚠/뚱카롱">
<meta property="og:description" content="본캐닉만 입력하면 자동 분류됩니다">
<link rel="icon" href="../favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #fff1f2 100%); min-height: 100vh; }
  .pulse-dot { animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .badge-9만 { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
  .badge-half { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #1e40af; }
  .badge-new { background: linear-gradient(135deg, #fce7f3, #fbcfe8); color: #9d174d; }
  /* iOS safe-area */
  @supports (padding: env(safe-area-inset-bottom)) {
    body { padding-bottom: env(safe-area-inset-bottom); }
  }
</style>
</head>
<body class="p-4 lg:p-8">

<div class="max-w-md mx-auto">

  <!-- 헤더 -->
  <div class="text-center mb-4 pt-4">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-gradient-to-br from-pink-500 to-rose-500 shadow-lg mb-3">
      <i class="fas fa-shield-alt text-white text-2xl"></i>
    </div>
    <h1 class="text-xl font-black text-gray-800">수로 면제 신청</h1>
    <p class="text-[11px] text-gray-500 mt-1">뚠/뚱카롱 길드 · 본캐닉만 입력하면 자동 분류</p>
  </div>

  <!-- 점수 기준 안내 -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-3 mb-4">
    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2"><i class="fas fa-circle-info mr-1 text-pink-400"></i>본캐 수로 점수 기준</div>
    <div class="space-y-1 text-[11px]">
      <div class="flex items-center justify-between bg-amber-50 rounded-lg px-3 py-1.5">
        <span class="font-bold text-amber-700">9만 이상</span>
        <span class="font-black text-amber-700">전체 면제</span>
      </div>
      <div class="flex items-center justify-between bg-blue-50 rounded-lg px-3 py-1.5">
        <span class="font-bold text-blue-700">5.5만 이상 ~ 9만 미만</span>
        <span class="font-black text-blue-700">절반 면제</span>
      </div>
      <div class="flex items-center justify-between bg-red-50 rounded-lg px-3 py-1.5">
        <span class="font-bold text-red-700">5.5만 미만</span>
        <span class="font-black text-red-700">신청 불가</span>
      </div>
    </div>
  </div>

  <!-- ==================== 신청 폼 ==================== -->
  <div id="formCard" class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 mb-4">

    <!-- 본캐 검색 -->
    <div class="mb-4">
      <label class="text-[11px] text-gray-500 font-bold uppercase mb-2 block">본캐닉 *</label>
      <div class="relative">
        <input id="mainCharInput" type="text" placeholder="본캐 닉네임 입력" autocomplete="off"
          class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm font-bold outline-none focus:border-pink-300 focus:bg-white transition pr-12">
        <button onclick="searchMainChar()" id="searchBtn"
          class="absolute right-2 top-1/2 -translate-y-1/2 px-3 py-1.5 bg-pink-500 text-white rounded-xl text-xs font-bold hover:bg-pink-600 shadow disabled:opacity-50">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <!-- 검색 결과 영역 (동적 렌더) -->
    <div id="resultArea"></div>

    <!-- 사유 (선택) -->
    <div class="mb-4 hidden" id="reasonArea">
      <label class="text-[11px] text-gray-500 font-bold uppercase mb-2 block">사유 <span class="text-gray-400 normal-case font-normal">(선택)</span></label>
      <textarea id="reasonInput" placeholder="이번 주 사정 / 추가로 알릴 점 등"
        class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-pink-300 focus:bg-white transition h-20 resize-none"></textarea>
    </div>

    <!-- 오픈챗 닉 (선택) -->
    <div class="mb-4 hidden" id="kakaoArea">
      <label class="text-[11px] text-gray-500 font-bold uppercase mb-2 block">오픈채팅 닉 <span class="text-gray-400 normal-case font-normal">(본인 확인용 · 선택)</span></label>
      <input id="kakaoInput" type="text" placeholder="카톡 오픈챗 닉네임"
        class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 text-sm outline-none focus:border-pink-300 focus:bg-white transition">
    </div>

    <!-- 제출 버튼 -->
    <button onclick="submitRequest()" id="submitBtn"
      class="w-full bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black text-sm py-3.5 rounded-2xl shadow-lg hover:shadow-xl transition disabled:opacity-50 hidden">
      <i class="fas fa-paper-plane mr-2"></i>신청하기
    </button>

    <p id="submitNote" class="text-[10px] text-gray-400 text-center mt-3 hidden">신청 후 운영진이 검토합니다 · 처리되면 카톡 공지방에서 확인</p>
  </div>

  <!-- ==================== 본인 신청 이력 ==================== -->
  <div id="historyCard" class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 mb-4 hidden">
    <h3 class="text-sm font-black text-gray-800 mb-4 flex items-center gap-2">
      <i class="fas fa-clock-rotate-left text-pink-500"></i>내 신청 내역
    </h3>
    <div id="historyList" class="space-y-2"></div>
  </div>

  <!-- 푸터 -->
  <div class="text-center py-4">
    <p class="text-[10px] text-gray-400">
      <a href="../" class="hover:text-pink-500"><i class="fas fa-home mr-1"></i>뚠/뚱카롱 메인</a>
    </p>
  </div>

</div>

<!-- ==================== 토스트 ==================== -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 bg-slate-900 text-white text-sm font-bold rounded-2xl shadow-2xl hidden z-50 max-w-xs text-center"></div>

<script>
  // ============ 설정 ============
  const SUPABASE_URL = 'https://luglshrfkkeacmefnvlm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1Z2xzaHJma2tlYWNtZWZudmxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE0NTIsImV4cCI6MjA4NzYzNzQ1Mn0.LrJ-ejXJGqVGzrJyL5nFW45J92-MxrcKuEpE2EGNsIo';
  const R2_WORKER_URL = 'https://guild-images.hongsb9912.workers.dev';
  const R2_API_KEY = 'guild-manager-r2-key-2026';
  const SCORE_FULL_THRESHOLD = 90000;  // 9만 이상 → 전체 면제
  const SCORE_HALF_THRESHOLD = 55000;  // 5.5만 이상 ~ 9만 미만 → 절반 면제 / 5.5만 미만은 신청 불가

  // 길드 리스트 (수동 입력용 드롭다운)
  const GUILDS = ['뚠카롱', '뚱카롱', '밤카롱', '별카롱', '달카롱', '꿀카롱', '솜카롱'];
  // 직업 (간소 버전)
  const JOBS = ['히어로','팔라딘','다크나이트','아크메이지(불,독)','아크메이지(썬,콜)','비숍','보우마스터','신궁','패스파인더','나이트로드','섀도어','듀얼블레이더','바이퍼','캡틴','캐논마스터','미하일','소울마스터','플레임위자드','윈드브레이커','나이트워커','스트라이커','아란','에반','루미너스','메르세데스','팬텀','은월','데몬슬레이어','데몬어벤져','블래스터','배틀메이지','와일드헌터','메카닉','제논','카이저','카인','카데나','엔젤릭버스터','라라','호영','아델','일리움','아크','칼리','제로','키네시스','렌'];

  const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ============ 상태 ============
  let state = {
    mainChar: null,         // 검색된 본캐 (members 테이블 row) 또는 직접 입력 시 가짜 객체
    mainScore: null,        // 본캐 수로 점수
    isAutoMatched: false,   // members 테이블에서 자동 매칭 여부
    isScoreManual: false,   // 점수 수동 입력 여부
    subChars: [],           // 면제 신청할 부캐 [{name, guild, was_mapped, selected, manual}]
    isNewMember: false,     // 신규 가입 동시 신청
    latestPeriod: null      // 최신 수로 회차 {id, period_label}
  };

  // ============ 유틸 ============
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const toast = (msg, type = 'info') => {
    const el = document.getElementById('toast');
    const colors = { error: 'bg-red-500', success: 'bg-emerald-500', info: 'bg-slate-900' };
    el.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 text-white text-sm font-bold rounded-2xl shadow-2xl z-50 max-w-xs text-center fade-in ${colors[type] || colors.info}`;
    el.textContent = msg;
    el.classList.remove('hidden');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.add('hidden'), 3000);
  };

  // 점수 → 신청 타입 (full / half)
  // null = 점수 미입력 / 'ineligible' = 신청 불가 / 'full' / 'half'
  const requestTypeFromScore = (score) => {
    if (score == null || isNaN(score)) return null;
    const n = Number(score);
    if (n >= SCORE_FULL_THRESHOLD) return 'full';
    if (n >= SCORE_HALF_THRESHOLD) return 'half';
    return 'ineligible';
  };

  // 점수 일괄 조회 (suro_scores 테이블)
  async function fetchScores(memberIds, periodId) {
    if (!memberIds.length || !periodId) return new Map();
    const { data } = await supa.from('suro_scores')
      .select('member_id, score').in('member_id', memberIds).eq('period_id', periodId);
    const map = new Map();
    (data || []).forEach(r => map.set(r.member_id, Math.round(Number(r.score))));
    return map;
  }

  // ============ 본캐 검색 ============
  async function searchMainChar() {
    const name = document.getElementById('mainCharInput').value.trim();
    if (!name) { toast('본캐닉을 입력해주세요', 'error'); return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    document.getElementById('resultArea').innerHTML = '<div class="text-center py-4 text-gray-400 text-xs"><i class="fas fa-spinner fa-spin mr-1"></i>조회 중...</div>';

    try {
      // 최신 수로 회차 조회 (1회만)
      if (!state.latestPeriod) {
        const { data: periods } = await supa.from('suro_periods')
          .select('id, period_label').order('id', { ascending: false }).limit(1);
        if (periods && periods[0]) state.latestPeriod = periods[0];
      }

      // 본캐 조회
      const { data: members, error } = await supa.from('members')
        .select('*').eq('name', name);
      if (error) throw error;

      // 본캐 우선 (is_main !== false), 없으면 첫 번째
      let mainCandidate = (members || []).find(m => m.is_main !== false) || (members || [])[0] || null;

      if (mainCandidate) {
        // 부캐 조회
        const { data: subs } = await supa.from('members').select('*').eq('main_char_name', name);
        const subList = (subs || []).filter(s => s.is_main === false);

        // 점수 일괄 조회 (본캐 + 부캐)
        const ids = [mainCandidate.id, ...subList.map(s => s.id)];
        const scoresMap = state.latestPeriod ? await fetchScores(ids, state.latestPeriod.id) : new Map();

        state.mainChar = mainCandidate;
        state.isAutoMatched = true;
        state.mainScore = scoresMap.get(mainCandidate.id) ?? null;
        state.isScoreManual = (state.mainScore == null);
        state.subChars = subList.map(s => ({
          name: s.name, guild: s.guild || '', was_mapped: true, manual: false, selected: false,
          score: scoresMap.get(s.id) ?? null
        }));
        state.isNewMember = false;
        renderAutoMatched();
      } else {
        // 못 찾음 → 폴백 모드
        state.mainChar = null;
        state.isAutoMatched = false;
        state.mainScore = null;
        state.isScoreManual = true;
        state.subChars = [];
        state.isNewMember = true;
        renderManualMode(name);
      }
    } catch (e) {
      console.error(e);
      document.getElementById('resultArea').innerHTML = `<div class="text-center py-4 text-red-500 text-xs">조회 실패: ${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-search"></i>';
    }

    // 본인 신청 이력 표시
    loadHistory(name);
  }

  // ============ 자동 매칭 모드 렌더 ============
  function renderAutoMatched() {
    const m = state.mainChar;
    const score = state.mainScore;
    const hasScore = score != null;
    const reqType = requestTypeFromScore(score);
    const badge = reqType === 'full' ? '<span class="badge-9만 text-[10px] font-black px-2 py-1 rounded-lg">9만+</span>'
                : reqType === 'half' ? '<span class="badge-half text-[10px] font-black px-2 py-1 rounded-lg">5.5~9만</span>'
                : reqType === 'ineligible' ? '<span class="text-[10px] font-black text-red-700 bg-red-100 px-2 py-1 rounded-lg">신청 불가</span>'
                : '<span class="text-[10px] font-black text-gray-500 bg-gray-100 px-2 py-1 rounded-lg">점수 없음</span>';

    const scoreInputClasses = !hasScore ? 'border-amber-300 text-amber-700'
      : reqType === 'full' ? 'border-emerald-200 text-emerald-600'
      : reqType === 'half' ? 'border-blue-200 text-blue-600'
      : 'border-red-200 text-red-600';

    const periodLabel = state.latestPeriod?.period_label || '지난주';
    const shortPeriod = periodLabel.replace(/ 수로 점수.*$/, '').trim() || '지난주';
    const scoreNotice = hasScore
      ? `<div class="flex items-center justify-between mb-1.5">
           <span class="text-[11px] text-gray-500 font-bold">현재 수로 점수</span>
           <span class="text-[9px] font-black text-emerald-700 bg-emerald-100 px-1.5 py-0.5 rounded"><i class="fas fa-bolt mr-0.5"></i>${esc(shortPeriod)} 자동</span>
         </div>`
      : `<div class="flex items-center gap-2 text-amber-700 mb-2">
           <i class="fas fa-exclamation-triangle"></i>
           <span class="text-[11px] font-black">지난주 수로 점수 데이터 없음</span>
         </div>
         <p class="text-[10px] text-gray-600 mb-2">신규 가입자거나 지난주 미참여. <strong>이번 주 점수를 직접 입력</strong>해주세요.</p>`;

    const matchedSub = state.subChars;

    document.getElementById('resultArea').innerHTML = `
      <div class="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-4 mb-4 border border-emerald-100 fade-in">
        <div class="flex items-center gap-2 text-[10px] font-black text-emerald-600 mb-2">
          <i class="fas fa-check-circle"></i>본캐 자동 매칭 완료
        </div>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-white p-1 flex items-center justify-center"><i class="fas fa-user text-emerald-400"></i></div>
          <div class="flex-1">
            <div class="font-black text-gray-800 text-sm">${esc(m.name)}</div>
            <div class="text-[11px] text-gray-500">${esc(m.class || '직업 없음')} · ${esc(m.guild || '길드 없음')}</div>
          </div>
          ${badge}
        </div>
        <div class="mt-3 pt-3 border-t border-emerald-200/50">
          ${scoreNotice}
          <div class="flex gap-2">
            <input id="scoreInput" type="number" inputmode="numeric" value="${hasScore ? score : ''}" placeholder="예: 95000"
              oninput="onScoreChange(this.value)"
              class="flex-1 bg-white border-2 ${scoreInputClasses} rounded-xl px-3 py-2 text-base font-black outline-none">
            ${hasScore ? `<button onclick="resetScore()" class="px-3 py-2 bg-white border border-gray-200 text-gray-500 rounded-xl text-[10px] font-bold hover:bg-gray-50" title="자동값으로 되돌리기"><i class="fas fa-rotate-left"></i></button>` : ''}
          </div>
          <p id="scoreNote" class="text-[10px] mt-1.5"></p>
        </div>
        <div id="reqTypeBadge" class="mt-2 text-[11px] font-bold px-3 py-2 rounded-xl text-center"></div>
      </div>

      <div class="mb-4">
        <label class="text-[11px] text-gray-500 font-bold uppercase mb-2 block">면제 신청할 부캐 선택 *</label>
        <div id="subList" class="space-y-2"></div>
        <button onclick="addManualSub()" class="w-full mt-2 px-3 py-2 bg-gray-50 border border-dashed border-gray-300 text-gray-500 rounded-xl text-xs font-bold hover:bg-gray-100">
          <i class="fas fa-plus mr-1"></i>리스트에 없는 부캐 추가
        </button>
      </div>
    `;
    renderSubList();
    updateReqTypeBadge();
    showSubmitArea();
  }

  // ============ 수동 모드 (본캐 못 찾음) ============
  function renderManualMode(typedName) {
    state.mainChar = { name: typedName, manual: true };
    document.getElementById('resultArea').innerHTML = `
      <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-4 fade-in">
        <div class="flex items-center gap-2 text-amber-700 mb-2">
          <i class="fas fa-info-circle"></i>
          <span class="text-xs font-black">사이트에 등록된 본캐가 아닙니다</span>
        </div>
        <p class="text-[11px] text-gray-600 leading-relaxed">신규 가입자거나, 본캐가 아직 등록 안 된 경우입니다. <strong>아래 정보를 직접 입력</strong>해주세요. 운영진이 검토 후 처리합니다.</p>
      </div>

      <label class="flex items-center gap-3 p-3 bg-pink-50 border border-pink-200 rounded-2xl mb-4 cursor-pointer">
        <input type="checkbox" id="newMemberToggle" checked onchange="state.isNewMember=this.checked" class="w-4 h-4 accent-pink-500">
        <div class="flex-1">
          <div class="text-xs font-black text-pink-700"><i class="fas fa-user-plus mr-1"></i>신규 가입 동시 신청</div>
          <div class="text-[10px] text-pink-600/70 mt-0.5">아직 가입 신청 안 했으면 같이 등록해드림</div>
        </div>
      </label>

      <div class="space-y-3 mb-4">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block">본캐 직업</label>
            <select id="manualJobInput" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-bold">
              ${JOBS.map(j => `<option value="${esc(j)}">${esc(j)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block">본캐 길드</label>
            <select id="manualGuildInput" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-bold">
              ${GUILDS.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div>
          <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block">현재 수로 점수 (직접 입력) *</label>
          <input id="scoreInput" type="number" inputmode="numeric" placeholder="예: 95000" oninput="onScoreChange(this.value)"
            class="w-full bg-gray-50 border-2 border-amber-300 rounded-xl px-3 py-2.5 text-base font-black text-amber-700 outline-none">
          <p id="scoreNote" class="text-[10px] mt-1"></p>
        </div>
      </div>

      <div id="reqTypeBadge" class="mb-4 text-[11px] font-bold px-3 py-2 rounded-xl text-center bg-gray-100 text-gray-500">점수를 입력해주세요</div>

      <div class="mb-4">
        <label class="text-[11px] text-gray-500 font-bold uppercase mb-2 block">면제 신청할 부캐 (직접 추가) *</label>
        <div id="subList" class="space-y-2"></div>
        <button onclick="addManualSub()" class="w-full mt-2 px-3 py-2 bg-gray-50 border border-dashed border-gray-300 text-gray-500 rounded-xl text-xs font-bold hover:bg-gray-100">
          <i class="fas fa-plus mr-1"></i>부캐 추가
        </button>
      </div>
    `;
    showSubmitArea();
  }

  // ============ 점수 변경 ============
  function onScoreChange(val) {
    const num = parseInt(val);
    state.mainScore = isNaN(num) ? null : num;
    state.isScoreManual = true;
    updateReqTypeBadge();
  }

  async function resetScore() {
    if (!state.mainChar?.id || !state.latestPeriod?.id) return;
    const map = await fetchScores([state.mainChar.id], state.latestPeriod.id);
    const auto = map.get(state.mainChar.id) ?? null;
    state.mainScore = auto;
    state.isScoreManual = false;
    const inp = document.getElementById('scoreInput');
    if (inp) inp.value = auto ?? '';
    updateReqTypeBadge();
  }

  function updateReqTypeBadge() {
    const badge = document.getElementById('reqTypeBadge');
    const note = document.getElementById('scoreNote');
    const submitBtn = document.getElementById('submitBtn');
    if (!badge) return;
    const reqType = requestTypeFromScore(state.mainScore);
    if (reqType === 'full') {
      badge.className = 'mt-2 text-[11px] font-bold px-3 py-2 rounded-xl text-center bg-amber-100 text-amber-700';
      badge.innerHTML = '<i class="fas fa-check-circle mr-1"></i>전체 면제 대상 (9만 이상)';
      if (note) note.innerHTML = `<span class="text-amber-600"><i class="fas fa-bolt mr-0.5"></i>9만 이상이라 전체 면제 대상</span>`;
      if (submitBtn) { submitBtn.disabled = false; submitBtn.classList.remove('opacity-40','cursor-not-allowed'); }
    } else if (reqType === 'half') {
      badge.className = 'mt-2 text-[11px] font-bold px-3 py-2 rounded-xl text-center bg-blue-100 text-blue-700';
      badge.innerHTML = '<i class="fas fa-info-circle mr-1"></i>절반 면제 대상 (5.5만 이상 ~ 9만 미만)';
      if (note) note.innerHTML = `<span class="text-blue-600"><i class="fas fa-info-circle mr-0.5"></i>5.5만 이상 ~ 9만 미만이라 절반 면제 대상</span>`;
      if (submitBtn) { submitBtn.disabled = false; submitBtn.classList.remove('opacity-40','cursor-not-allowed'); }
    } else if (reqType === 'ineligible') {
      badge.className = 'mt-2 text-[11px] font-bold px-3 py-2 rounded-xl text-center bg-red-100 text-red-700';
      badge.innerHTML = '<i class="fas fa-circle-xmark mr-1"></i>신청 불가 — 본캐 수로 점수 5.5만 미만';
      if (note) note.innerHTML = `<span class="text-red-600"><i class="fas fa-circle-xmark mr-0.5"></i>면제 신청 자격 미달 (5.5만 이상이어야 절반 면제 신청 가능)</span>`;
      if (submitBtn) { submitBtn.disabled = true; submitBtn.classList.add('opacity-40','cursor-not-allowed'); }
    } else {
      badge.className = 'mt-2 text-[11px] font-bold px-3 py-2 rounded-xl text-center bg-gray-100 text-gray-500';
      badge.innerHTML = '점수를 입력해주세요';
      if (note) note.innerHTML = '';
      if (submitBtn) { submitBtn.disabled = true; submitBtn.classList.add('opacity-40','cursor-not-allowed'); }
    }
  }

  // ============ 부캐 리스트 렌더 ============
  function renderSubList() {
    const wrap = document.getElementById('subList');
    if (!wrap) return;
    if (state.subChars.length === 0) {
      wrap.innerHTML = '<div class="text-center py-3 text-gray-400 text-xs">아직 추가된 부캐가 없습니다</div>';
      return;
    }
    wrap.innerHTML = state.subChars.map((s, i) => {
      if (s.manual) {
        // 수동 입력 행
        return `
          <div class="flex gap-2 p-3 bg-amber-50 border border-amber-200 rounded-2xl items-center">
            <input type="text" placeholder="부캐닉" value="${esc(s.name || '')}" oninput="updateManualSub(${i}, 'name', this.value)" class="flex-1 bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-xs">
            <select onchange="updateManualSub(${i}, 'guild', this.value)" class="bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-xs">
              ${GUILDS.map(g => `<option value="${esc(g)}" ${s.guild === g ? 'selected' : ''}>${esc(g)}</option>`).join('')}
            </select>
            <span class="text-[9px] font-black text-amber-700 bg-amber-200 px-2 py-1 rounded-md">신규</span>
            <button onclick="removeSub(${i})" class="text-red-400 hover:text-red-600 px-1"><i class="fas fa-times"></i></button>
          </div>`;
      }
      return `
        <label class="flex items-center gap-3 p-3 bg-white border ${s.selected ? 'border-2 border-pink-300 bg-pink-50/30' : 'border-gray-200 hover:border-pink-300'} rounded-2xl cursor-pointer transition">
          <input type="checkbox" ${s.selected ? 'checked' : ''} onchange="toggleSub(${i})" class="w-4 h-4 accent-pink-500">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-bold text-gray-800 truncate">${esc(s.name)}</div>
            <div class="text-[11px] text-gray-400">${esc(s.guild || '길드 없음')}${s.score != null ? ' · ' + s.score.toLocaleString() + '점' : ''}</div>
          </div>
          ${s.selected ? '<span class="text-[10px] font-black text-pink-600 bg-pink-100 px-2 py-0.5 rounded-full">선택</span>' : ''}
        </label>`;
    }).join('');
  }

  function toggleSub(i) {
    state.subChars[i].selected = !state.subChars[i].selected;
    renderSubList();
  }

  function addManualSub() {
    state.subChars.push({ name: '', guild: GUILDS[0], was_mapped: false, manual: true, selected: true });
    renderSubList();
  }

  function updateManualSub(i, field, val) {
    state.subChars[i][field] = val;
  }

  function removeSub(i) {
    state.subChars.splice(i, 1);
    renderSubList();
  }

  function showSubmitArea() {
    document.getElementById('reasonArea').classList.remove('hidden');
    document.getElementById('kakaoArea').classList.remove('hidden');
    document.getElementById('submitBtn').classList.remove('hidden');
    document.getElementById('submitNote').classList.remove('hidden');
  }

  // ============ 제출 ============
  async function submitRequest() {
    if (!state.mainChar) { toast('본캐를 먼저 검색해주세요', 'error'); return; }
    const reqType = requestTypeFromScore(state.mainScore);
    if (!reqType) { toast('수로 점수를 입력해주세요', 'error'); return; }
    if (reqType === 'ineligible') { toast('본캐 수로 점수 5.5만 이상이어야 신청 가능합니다', 'error'); return; }

    // 선택된 부캐 (자동 매칭은 selected, 수동은 모두 포함)
    const selectedSubs = state.subChars.filter(s => s.manual ? (s.name && s.name.trim()) : s.selected);
    if (selectedSubs.length === 0) { toast('면제 신청할 부캐를 1개 이상 선택해주세요', 'error'); return; }

    const isManual = state.mainChar.manual === true;
    const mainClass = isManual ? document.getElementById('manualJobInput').value : (state.mainChar.class || null);
    const mainGuild = isManual ? document.getElementById('manualGuildInput').value : (state.mainChar.guild || null);

    const payload = {
      main_char: state.mainChar.name,
      main_class: mainClass,
      main_guild: mainGuild,
      main_score: state.mainScore,
      is_score_manual: state.isScoreManual,
      request_type: reqType,
      sub_chars: selectedSubs.map(s => ({
        name: s.name.trim(),
        guild: s.guild,
        was_mapped: !!s.was_mapped,
        status: 'pending'
      })),
      is_new_member: state.isNewMember,
      kakao_nick: document.getElementById('kakaoInput').value.trim() || null,
      reason: document.getElementById('reasonInput').value.trim() || null,
      status: 'pending'
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>제출 중...';

    try {
      const { data, error } = await supa.from('exempt_requests').insert(payload).select().single();
      if (error) throw error;

      // 디스코드 알림 (실패해도 신청은 성공으로 처리)
      try {
        await notifyDiscord(data);
      } catch (e) {
        console.warn('Discord notify failed:', e);
      }

      toast('신청 완료! 운영진이 검토합니다', 'success');
      // 폼 리셋
      document.getElementById('reasonInput').value = '';
      document.getElementById('kakaoInput').value = '';
      state.subChars = [];
      // 검색 결과 다시 로드 (이력 갱신)
      const name = document.getElementById('mainCharInput').value.trim();
      setTimeout(() => searchMainChar(), 800);
    } catch (e) {
      console.error(e);
      toast('신청 실패: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>신청하기';
    }
  }

  // ============ 디스코드 알림 ============
  async function notifyDiscord(req) {
    const subList = (req.sub_chars || []).map(s => `${s.name} (${s.guild})`).join(', ');
    const typeLabel = req.request_type === 'full' ? '전체 면제 (9만+)' : '절반 면제 (9만-)';
    const colorBlock = req.request_type === 'full' ? 0xfbbf24 : 0x3b82f6;
    const newBadge = req.is_new_member ? ' 🆕 신규 가입 동시' : '';

    const payload = {
      embeds: [{
        title: '🛡️ 새 수로 면제 신청',
        description: `**${req.main_char}** 님이 면제 신청했습니다${newBadge}`,
        color: colorBlock,
        fields: [
          { name: '본캐', value: `${req.main_char} (${req.main_class || '직업?'} · ${req.main_guild || '길드?'})`, inline: false },
          { name: '점수', value: `${(req.main_score || 0).toLocaleString()}${req.is_score_manual ? ' (수동)' : ' (자동)'}`, inline: true },
          { name: '신청 타입', value: typeLabel, inline: true },
          { name: '부캐', value: subList || '없음', inline: false },
        ],
        footer: { text: req.reason ? `사유: ${req.reason}` : '운영진 검토 대기' },
        timestamp: new Date().toISOString()
      }]
    };

    const res = await fetch(`${R2_WORKER_URL}/discord-notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': R2_API_KEY },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Discord proxy failed: ' + res.status);
  }

  // ============ 본인 신청 이력 ============
  async function loadHistory(mainCharName) {
    const card = document.getElementById('historyCard');
    const list = document.getElementById('historyList');
    try {
      const { data, error } = await supa.from('exempt_requests')
        .select('id, status, request_type, sub_chars, processed_at, created_at, admin_note, revoke_reason')
        .eq('main_char', mainCharName).order('created_at', { ascending: false }).limit(10);
      if (error) throw error;
      if (!data || data.length === 0) {
        card.classList.add('hidden');
        return;
      }
      list.innerHTML = data.map(r => renderHistoryRow(r)).join('');
      card.classList.remove('hidden');
    } catch (e) {
      console.warn('History load failed:', e);
      card.classList.add('hidden');
    }
  }

  function renderHistoryRow(r) {
    const statusMap = {
      pending: { color: 'amber', label: '처리 중', icon: 'clock' },
      hold: { color: 'amber', label: '보류 중', icon: 'pause' },
      active: { color: 'emerald', label: '면제 적용 중', icon: 'check-circle' },
      rejected: { color: 'red', label: '거절됨', icon: 'times-circle' },
      revoked: { color: 'gray', label: '면제 해제됨', icon: 'rotate-left' }
    };
    const s = statusMap[r.status] || statusMap.pending;
    const subList = (r.sub_chars || []).map(x => x.name).join(', ');
    const dateLabel = r.processed_at ? new Date(r.processed_at).toLocaleString('ko-KR') : new Date(r.created_at).toLocaleString('ko-KR');
    const noteHtml = r.status === 'rejected' && r.admin_note ? `<div class="text-[11px] text-red-600 mt-1">사유: ${esc(r.admin_note)}</div>`
                  : r.status === 'hold' && r.admin_note ? `<div class="text-[11px] text-amber-600 mt-1">보류 사유: ${esc(r.admin_note)}</div>`
                  : r.status === 'revoked' && r.revoke_reason ? `<div class="text-[11px] text-gray-500 mt-1">해제 사유: ${esc(r.revoke_reason)}</div>` : '';
    return `
      <div class="bg-${s.color}-50 border border-${s.color}-200 rounded-2xl p-3">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-black text-${s.color}-700 bg-${s.color}-100 px-2 py-0.5 rounded-full">
            ${r.status === 'pending' ? '<span class="pulse-dot inline-block w-1.5 h-1.5 bg-amber-500 rounded-full mr-1"></span>' : `<i class="fas fa-${s.icon} mr-1"></i>`}
            ${s.label}
          </span>
          <span class="text-[10px] text-gray-400">${esc(dateLabel)}</span>
        </div>
        <div class="text-sm font-bold text-gray-800">${esc(subList || '부캐 없음')}</div>
        <div class="text-[11px] text-gray-500 mt-1">${r.request_type === 'full' ? '전체 면제' : '절반 면제'}</div>
        ${noteHtml}
      </div>`;
  }

  // ============ 엔터키로 검색 ============
  document.getElementById('mainCharInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); searchMainChar(); }
  });
</script>

</body>
